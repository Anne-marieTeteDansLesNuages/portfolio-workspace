<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <!-- Oxygen font -->
  <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Oxygen", sans-serif;
      background-color: #F7D3A0; /* your soft peach hover tone */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      text-align: center;
      max-width: 420px;
    }

    h1 {
      color: #592A3B; /* your accent color */
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
    }

    p {
      color: #592A3B;
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a.button {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #BF5B04; /* your warm orange */
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      transition: background-color 0.2s ease;
    }

    a.button:hover {
      background-color: #a44f04;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully.
    I appreciate you taking the time to reach out — I’ll get back to you soon.</p>

    <a href="https://anne-marietetedanslesnuages.github.io/portfolio-workspace/" class="button">Back to Home</a>
    
  </div>
</body>
</html>
